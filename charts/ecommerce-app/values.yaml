replicaCount: 2

image:
  repository: ecommerce-app
  tag: ci
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

config:
  dbHost: postgres
  dbPort: "5432"
  dbName: gamestore
  dbUser: postgres

secret:
  dbPassword: postgres

postgres:
  image: postgres:16-alpine
  port: 5432