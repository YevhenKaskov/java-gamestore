databaseChangeLog:

  - changeSet:
      id: 001-create-genre-table
      author: yevhen
      changes:
        - createTable:
            tableName: genre
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: genre
            columnNames: name
            constraintName: uk_genre_name


  - changeSet:
      id: 002-create-game-table
      author: yevhen
      changes:
        - createTable:
            tableName: game
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: studio
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: VARCHAR(1000)

              - column:
                  name: genre_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: price
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false


  - changeSet:
      id: 003-add-game-genre-fk
      author: yevhen
      changes:
        - addForeignKeyConstraint:
            baseTableName: game
            baseColumnNames: genre_id
            referencedTableName: genre
            referencedColumnNames: id
            constraintName: fk_game_genre
            onDelete: CASCADE